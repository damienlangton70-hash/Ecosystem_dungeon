  <rect x="0" y="22" width="64" height="5" fill="#F0F0F0"/>
  <rect x="0" y="34" width="64" height="6" fill="#F5F5F5"/>
  <rect x="0" y="46" width="64" height="5" fill="#F0F0F0"/>
  <rect x="0" y="58" width="64" height="6" fill="#F5F5F5"/>
</svg>
