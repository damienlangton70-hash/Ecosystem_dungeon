# Deepforage — CI. Validate on every push & pull request; export desktop builds on main.
# The `validate` job downloads Godot 4.3 headless and runs tools/validate.sh
# (project import + boot smoke-test + gameplay self-test + originality lint), so a
# broken commit — a parse error, a duplicate class_name, or a banned external-IP
# name — fails fast instead of lingering on main. The heavier `export` job (needs
# export templates) runs only on pushes to main.

name: Build Deepforage

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.3-stable"
  GODOT_DOTVER: "4.3.stable"

jobs:
  validate:
    name: Validate (QA gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.3 (headless editor)
        run: |
          set -e
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot
      - name: Run validate.sh (import + boot + self-test + originality lint)
        run: GODOT="$PWD/godot" bash tools/validate.sh .

  export:
    name: Export desktop builds
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4.3 + export templates
        run: |
          set -e
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot
          curl -sSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q templates.tpz
          TPL="$HOME/.local/share/godot/export_templates/${GODOT_DOTVER}"
          mkdir -p "$TPL"
          mv templates/* "$TPL/"
      - name: Export Linux
        continue-on-error: true
        run: |
          mkdir -p build/linux
          ./godot --headless --path . --export-release "Linux" build/linux/Deepforage.x86_64
      - name: Export Windows
        continue-on-error: true
        run: |
          mkdir -p build/windows
          ./godot --headless --path . --export-release "Windows Desktop" build/windows/Deepforage.exe
      - name: Upload desktop builds
        uses: actions/upload-artifact@v4
        with:
          name: Deepforage-desktop
          path: build/
          if-no-files-found: warn
